<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content">
    <title>Diskgas — Atendimento</title>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        /* Estilos simplificados para o exemplo, mantendo a estrutura do usuário */
        body { font-family: sans-serif; background: #f0f2f5; margin: 0; padding: 0; }
        .app { max-width: 430px; margin: 0 auto; height: 100vh; display: flex; flex-direction: column; background: white; }
        .header { background: #0F5BA8; color: white; padding: 15px; text-align: center; }
        .msgs { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .bubble { padding: 10px; border-radius: 10px; max-width: 80%; }
        .bubble.a { background: #e8f2ff; align-self: flex-start; }
        .bubble.u { background: #0F5BA8; color: white; align-self: flex-end; }
        .input-area { padding: 15px; border-top: 1px solid #ddd; display: flex; gap: 10px; }
        input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
        button { padding: 10px 20px; background: #0F5BA8; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="app">
        <div class="header">
            <h3>Atendimento Online</h3>
        </div>
        <div id="chat-messages" class="msgs">
            <!-- Mensagens aqui -->
        </div>
        <div class="input-area">
            <input type="text" id="message-input" placeholder="Digite sua mensagem...">
            <button onclick="sendMessage()">Enviar</button>
        </div>
    </div>

    <script>
        const SOCKET_SERVER_URL = window.location.hostname === 'localhost' ? 'http://localhost:3000' : 'https://backend-mlao.onrender.com';
        const socket = io(SOCKET_SERVER_URL);
        const userId = localStorage.getItem('chatUserId') || `user_${Date.now()}`;
        localStorage.setItem('chatUserId', userId);

        socket.on('connect', () => {
            console.log('Conectado:', socket.id);
            socket.emit('join', { userId: userId, isAdmin: false });
        });

        socket.on('receive_message', (data) => {
            addMessage(data.text, data.sender === 'Cliente' ? 'u' : 'a');
        });

        function addMessage(text, type) {
            const container = document.getElementById('chat-messages');
            const div = document.createElement('div');
            div.className = `bubble ${type}`;
            div.textContent = text;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        function sendMessage() {
            const input = document.getElementById('message-input');
            const text = input.value.trim();
            if (text) {
                socket.emit('send_message', { userId: userId, text: text, sender: 'Cliente' });
                addMessage(text, 'u');
                input.value = '';
            }
        }
    </script>
</body>
</html>
